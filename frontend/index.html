<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Fuentes premium -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600;1,700&family=DM+Sans:ital,wght@0,400;0,500;0,700;1,400;1,500;1,700&display=swap" rel="stylesheet">
    <style>
      :root {
        --ink: #0d0d0d; --paper: #f5f0e8; --gold: #c9a96e; --cream: #faf7f2;
        --paper-dark: #ede6d6; --mist: #8a9aaa; --radius: 4px;
      }
      body { margin: 0; padding: 0; background: var(--cream); font-family: system-ui, sans-serif; }
      .layout { display: flex; min-height: 100vh; }
      .sidebar { 
        width: 240px; min-height: 100vh; background: var(--ink); color: var(--paper);
        display: flex; flex-direction: column; position: fixed; top: 0; left: 0; z-index: 100;
      }
      .main-content { margin-left: 240px; flex: 1; padding: 2rem; min-height: 100vh; }
      .sidebar-nav { padding: 1rem; display: flex; flex-direction: column; gap: 0.5rem; }
      .nav-item { 
        display: flex; align-items: center; gap: 0.75rem; padding: 0.75rem; 
        color: var(--mist); text-decoration: none; border-radius: var(--radius);
      }
      .nav-item.active { background: rgba(201,169,110,0.15); color: var(--gold); }
      .sidebar-brand-premium { padding: 1.5rem 1rem; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.08); }
      .sidebar-logo-img { width: 160px; height: auto; display: block; margin: 0 auto; filter: brightness(1.1); }
      .brand-text { font-size: 1.25rem; font-weight: bold; letter-spacing: 1px; color: var(--paper); text-transform: uppercase; }
      .hero-cover { width: 220px; flex-shrink: 0; box-shadow: 0 10px 30px rgba(0,0,0,0.3); border-radius: 8px; overflow: hidden; margin-bottom: 2rem; }
      .hero-poster { width: 100%; height: auto; display: block; }
      @media (max-width: 768px) {
        .sidebar { width: 100%; height: auto; bottom: 0; top: auto; flex-direction: row; position: fixed; }
        .main-content { margin-left: 0; margin-bottom: 70px; }
      }
    </style>
    <title>BookTracker</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
