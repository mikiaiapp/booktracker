<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#c9a96e" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="apple-touch-icon" href="/logo-premium.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <!-- SEO & UX Premium -->
    <title>BookTracker | Tu Biblioteca Inteligente con IA</title>
    <meta name="description" content="Organiza tu biblioteca, genera resúmenes con IA y escucha podcasts personalizados de tus libros favoritos." />
    
    <!-- Open Graph (Facebook/WhatsApp/Discord) -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="BookTracker Premium" />
    <meta property="og:description" content="Tu biblioteca inteligente con análisis de IA y podcasts personalizados." />
    <meta property="og:image" content="/logo-premium.png" />
    
    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="BookTracker Premium" />
    <meta name="twitter:description" content="Domina tu biblioteca con el poder de la Inteligencia Artificial." />
    <meta name="twitter:image" content="/logo-premium.png" />
    
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(reg => console.log('SW registrado', reg))
            .catch(err => console.log('SW error', err));
        });
      }
    </script>

    <!-- Fuentes premium -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600;1,700&family=DM+Sans:ital,wght@0,400;0,500;0,700;1,400;1,500;1,700&display=swap" rel="stylesheet">
    
    <style>
      :root {
        --ink: #0d0d0d; --paper: #f5f0e8; --gold: #c9a96e; --cream: #faf7f2;
        --paper-dark: #ede6d6; --mist: #8a9aaa; --radius: 4px;
      }
      body { margin: 0; padding: 0; background: var(--cream); font-family: system-ui, sans-serif; }
      .layout { display: flex; min-height: 100vh; }
      .sidebar { 
        width: 240px; min-height: 100vh; background: var(--ink); color: var(--paper);
        display: flex; flex-direction: column; position: fixed; top: 0; left: 0; z-index: 100;
      }
      .main-content { margin-left: 240px; flex: 1; padding: 2rem; min-height: 100vh; }
      .sidebar-nav { padding: 1rem; display: flex; flex-direction: column; gap: 0.5rem; }
      .nav-item { 
        display: flex; align-items: center; gap: 0.75rem; padding: 0.75rem; 
        color: var(--mist); text-decoration: none; border-radius: var(--radius);
      }
      .nav-item.active { background: rgba(201,169,110,0.15); color: var(--gold); }
      .sidebar-brand-premium { padding: 2rem 1rem; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.08); }
      .brand-text { font-size: 1.25rem; font-weight: 800; letter-spacing: 2px; color: var(--paper); text-transform: uppercase; display: block; }
      .sidebar-logo-footer-large { width: 120px; height: auto; display: block; margin: 2rem auto; opacity: 0.9; transition: transform 0.3s; }
      .sidebar-logo-footer-large:hover { transform: scale(1.05); }
      .sidebar-footer { padding: 1.5rem 1rem; border-top: 1px solid rgba(255,255,255,0.08); margin-top: auto; }
      .user-badge { display: flex; align-items: center; gap: 0.75rem; font-family: 'DM Sans', sans-serif; }
      .user-avatar { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; color: white; flex-shrink: 0; box-shadow: 0 0 0 2px rgba(255,255,255,0.05); }
      .user-info { display: flex; flex-direction: column; min-width: 0; }
      .user-name { font-size: 0.85rem; font-weight: 700; color: var(--paper); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
      .user-email { font-size: 0.75rem; color: var(--mist); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
      .logout-btn { background: none; border: none; color: var(--mist); padding: 0.5rem; transition: color 0.2s; cursor: pointer; display: flex; align-items: center; }
      .logout-btn:hover { color: #e74c3c; }
      .read-status-overlay { position: absolute; bottom: 8px; right: 8px; z-index: 10; background: rgba(13,13,13,0.6); padding: 4px; border-radius: 50%; line-height: 0; backdrop-filter: blur(4px); }
      .hero-cover { width: 220px; flex-shrink: 0; box-shadow: 0 10px 30px rgba(0,0,0,0.3); border-radius: 8px; overflow: hidden; margin-bottom: 2rem; }
      .hero-poster { width: 100%; height: auto; display: block; }

      /* Premium Pages System */
      .premium-page { padding: 3rem; max-width: 1200px; margin: 0 auto; min-height: 100vh; background: var(--cream); color: var(--ink); font-family: 'DM Sans', sans-serif; }
      .premium-header { margin-bottom: 2.5rem; }
      .premium-header h1 { font-family: var(--font-display); font-size: 2.5rem; margin: 0.5rem 0; color: var(--ink); }
      .premium-card { background: white; border: 1.5px solid var(--paper-dark); border-radius: 12px; padding: 2rem; box-shadow: var(--shadow); margin-bottom: 1.5rem; transition: transform 0.2s, border-color 0.2s; }
      .premium-card:hover { border-color: var(--gold); }
      .premium-input { 
        width: 100%; padding: 0.85rem 1rem; border: 1.5px solid var(--paper-dark); border-radius: 8px; 
        font-family: inherit; font-size: 0.95rem; background: var(--faf7f2); color: var(--ink); transition: all 0.2s;
      }
      .premium-input:focus { outline: none; border-color: var(--gold); background: white; box-shadow: 0 0 0 3px rgba(201,169,110,0.1); }
      .premium-label { display: block; font-size: 0.85rem; font-weight: 700; color: var(--mist); margin-bottom: 0.5rem; text-transform: uppercase; letter-spacing: 0.5px; }
      .premium-btn { 
        padding: 0.85rem 1.5rem; border-radius: 8px; border: none; font-weight: 700; cursor: pointer; 
        display: inline-flex; align-items: center; gap: 0.6rem; transition: all 0.2s; font-family: inherit;
      }
      .premium-btn.primary { background: var(--gold); color: white; }
      .premium-btn.primary:hover { background: #b8985e; transform: translateY(-1px); }
      .premium-btn.secondary { background: var(--ink); color: white; }
      .back-link { display: inline-flex; align-items: center; gap: 0.5rem; color: var(--mist); text-decoration: none; font-size: 0.9rem; font-weight: 500; margin-bottom: 1rem; transition: color 0.2s; }
      .back-link:hover { color: var(--ink); }
      
      @media (max-width: 768px) {
        .sidebar { width: 100%; height: auto; bottom: 0; top: auto; flex-direction: row; position: fixed; }
        .main-content { margin-left: 0; margin-bottom: 70px; }
      }
    </style>
    </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
