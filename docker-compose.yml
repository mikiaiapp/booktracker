# =============================================================
#  BookTracker · docker-compose.yml
#  Optimizado para Synology NAS + Portainer (Stack via GitHub)
# =============================================================
#
#  ANTES DEL PRIMER DEPLOY en Portainer:
#
#  1. Crear carpetas en el NAS (una sola vez vía SSH):
#       mkdir -p /volume1/docker/booktracker/data/{uploads,covers,audio,databases,redis}
#
#  2. En Portainer → Stacks → Add stack → Repository:
#       - Repository URL:  https://github.com/TU_USUARIO/TU_REPO
#       - Compose path:    docker-compose.yml
#
#  3. En la sección "Environment variables" de Portainer añadir:
#       SECRET_KEY, ANTHROPIC_API_KEY, OPENAI_API_KEY, etc.
#
#  ACCESO:  http://IP-NAS:8080
# =============================================================

version: "3.9"

# ── Variables compartidas entre backend y worker ───────────────
x-backend-env: &backend-env
  SECRET_KEY:           ${SECRET_KEY:?Variable SECRET_KEY no definida en Portainer}
  ANTHROPIC_API_KEY:    ${ANTHROPIC_API_KEY:-}
  OPENAI_API_KEY:       ${OPENAI_API_KEY:-}
  AI_MODEL:             ${AI_MODEL:-claude-sonnet-4-20250514}
  TTS_PROVIDER:         ${TTS_PROVIDER:-openai}
  ELEVENLABS_API_KEY:   ${ELEVENLABS_API_KEY:-}
  DATABASE_DIR:         /data/databases
  UPLOADS_DIR:          /data/uploads
  AUDIO_DIR:            /data/audio
  COVERS_DIR:           /data/covers
  REDIS_URL:            redis://redis:6379/0
  SMTP_HOST:            ${SMTP_HOST:-}
  SMTP_PORT:            ${SMTP_PORT:-587}
  SMTP_USER:            ${SMTP_USER:-}
  SMTP_PASS:            ${SMTP_PASS:-}
  SMTP_FROM:            ${SMTP_FROM:-noreply@booktracker.local}

x-backend-volumes: &backend-volumes
  - /volume1/docker/booktracker/data/uploads:/data/uploads
  - /volume1/docker/booktracker/data/covers:/data/covers
  - /volume1/docker/booktracker/data/audio:/data/audio
  - /volume1/docker/booktracker/data/databases:/data/databases

# ── Servicios ──────────────────────────────────────────────────
services:

  # -----------------------------------------------------------
  # REDIS · Cola de tareas Celery
  # -----------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: booktracker-redis
    restart: unless-stopped
    command: >
      redis-server
      --save 60 1
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    volumes:
      - /volume1/docker/booktracker/data/redis:/data
    networks:
      - booktracker-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  # -----------------------------------------------------------
  # BACKEND · FastAPI
  # -----------------------------------------------------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: booktracker-backend:latest
    container_name: booktracker-backend
    restart: unless-stopped
    environment:
      <<: *backend-env
    volumes: *backend-volumes
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - booktracker-net
    healthcheck:
      # Apunta a /api/health (endpoint dedicado, siempre disponible)
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 60s   # NAS puede tardar en arrancar uvicorn

  # -----------------------------------------------------------
  # WORKER · Celery — procesamiento IA en background
  # -----------------------------------------------------------
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: booktracker-backend:latest
    container_name: booktracker-worker
    restart: unless-stopped
    command: >
      celery -A app.workers.celery_app worker
      --loglevel=info
      --concurrency=2
      --max-tasks-per-child=50
    environment:
      <<: *backend-env
    volumes: *backend-volumes
    depends_on:
      redis:
        condition: service_healthy
      # Sin condition: service_healthy en backend para evitar
      # bloqueo en cadena si el backend tarda en arrancar
      backend:
        condition: service_started
    networks:
      - booktracker-net

  # -----------------------------------------------------------
  # FRONTEND · React + Vite
  # -----------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: booktracker-frontend:latest
    container_name: booktracker-frontend
    restart: unless-stopped
    environment:
      - VITE_API_URL=/api
    networks:
      - booktracker-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 60s   # Vite build puede tardar en NAS lentos

  # -----------------------------------------------------------
  # NGINX · Proxy inverso
  # -----------------------------------------------------------
  nginx:
    image: nginx:1.27-alpine
    container_name: booktracker-nginx
    restart: unless-stopped
    ports:
      - "${NGINX_PORT:-8080}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - /volume1/docker/booktracker/data/covers:/data/covers:ro
      - /volume1/docker/booktracker/data/audio:/data/audio:ro
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    networks:
      - booktracker-net

# ── Red interna ────────────────────────────────────────────────
networks:
  booktracker-net:
    driver: bridge

# =============================================================
#  VARIABLES DE ENTORNO — añadir en Portainer → Environment variables
#
#  OBLIGATORIAS:
#  ┌─────────────────────┬────────────────────────────────────────┐
#  │ SECRET_KEY          │ Texto largo aleatorio (mín. 32 chars)  │
#  │ ANTHROPIC_API_KEY   │ sk-ant-...  (si usas Claude)           │
#  │ OPENAI_API_KEY      │ sk-...      (si usas GPT-4o o TTS)     │
#  │ AI_MODEL            │ claude-sonnet-4-20250514  o  gpt-4o    │
#  │ TTS_PROVIDER        │ openai  (más barato)  o  elevenlabs    │
#  └─────────────────────┴────────────────────────────────────────┘
#
#  OPCIONALES:
#  ┌─────────────────────┬────────────────────────────────────────┐
#  │ NGINX_PORT          │ 8080  (cambia si el puerto está ocupado)│
#  │ ELEVENLABS_API_KEY  │ Solo si TTS_PROVIDER=elevenlabs        │
#  │ SMTP_HOST           │ smtp.gmail.com  (para 2FA por email)   │
#  │ SMTP_PORT           │ 587                                    │
#  │ SMTP_USER           │ tu_cuenta@gmail.com                    │
#  │ SMTP_PASS           │ App Password de Google                 │
#  │ SMTP_FROM           │ noreply@booktracker.local              │
#  └─────────────────────┴────────────────────────────────────────┘
# =============================================================
