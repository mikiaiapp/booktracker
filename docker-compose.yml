version: "3.8"

services:
  # 💾 BASE DE DATOS (Mapeo de permisos)
  db:
    image: alpine:latest
    container_name: booktracker-db-init
    volumes:
      - /volume1/docker/booktracker/data/databases:/app/databases
    command: /bin/sh -c "chmod -R 777 /app/databases"

  # 🚀 BACKEND (FastAPI)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        - CACHE_BUST=v2.8.4
    container_name: booktracker-api
    restart: unless-stopped
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 1
    volumes:
      - /volume1/docker/booktracker/data:/data
      - /volume1/docker/booktracker/data/databases:/data/databases
      - /volume1/docker/booktracker/data/uploads:/data/uploads
      - /volume1/docker/booktracker/data/audio:/data/audio
      - /volume1/docker/booktracker/data/covers:/data/covers
    environment:
      - PYTHONPATH=/app
      - DATABASE_DIR=/data/databases
      - UPLOADS_DIR=/data/uploads
      - AUDIO_DIR=/data/audio
      - COVERS_DIR=/data/covers
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=${SECRET_KEY}
    depends_on:
      - redis
    networks:
      - booktracker-net

  # ⚙️ WORKER (Procesamiento de fondo)
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        - CACHE_BUST=v2.8.4
    container_name: booktracker-worker
    restart: unless-stopped
    command: celery -A app.workers.celery_app worker --loglevel=info --concurrency=1
    volumes:
      - /volume1/docker/booktracker/data:/data
      - /volume1/docker/booktracker/data/databases:/data/databases
      - /volume1/docker/booktracker/data/uploads:/data/uploads
      - /volume1/docker/booktracker/data/audio:/data/audio
      - /volume1/docker/booktracker/data/covers:/data/covers
    environment:
      - PYTHONPATH=/app
      - DATABASE_DIR=/data/databases
      - UPLOADS_DIR=/data/uploads
      - AUDIO_DIR=/data/audio
      - COVERS_DIR=/data/covers
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=${SECRET_KEY}
    depends_on:
      - redis
    networks:
      - booktracker-net

  # 🔴 REDIS (Cola de tareas)
  redis:
    image: redis:alpine
    container_name: booktracker-redis
    restart: unless-stopped
    networks:
      - booktracker-net

  # 🌐 FRONTEND (Vite / React)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - CACHE_BUST=v2.8.4
    container_name: booktracker-ui
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - booktracker-net

  # 🛡️ NGINX (Reverse Proxy & Static Files)
  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: booktracker-nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - /volume1/docker/booktracker/data/covers:/data/covers
      - /volume1/docker/booktracker/data/audio:/data/audio
    depends_on:
      - backend
      - frontend
    networks:
      - booktracker-net

networks:
  booktracker-net:
    driver: bridge
