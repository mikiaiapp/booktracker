# =============================================================
#  BookTracker · docker-compose.yml
#  Optimizado para Synology NAS + Portainer (Stack via GitHub)
# =============================================================
#
#  ANTES DEL PRIMER DEPLOY en Portainer:
#
#  1. Crear carpetas en el NAS (una sola vez vía SSH):
#       mkdir -p /volume1/docker/booktracker/data/{uploads,covers,audio,databases,redis}
#       mkdir -p /volume1/docker/booktracker/overrides
#
#  2. En Portainer → Stacks → Add stack → Repository:
#       - Repository URL:  https://github.com/TU_USUARIO/TU_REPO
#       - Compose path:    docker-compose.yml
#
#  3. En la sección "Environment variables" de Portainer añadir
#     las variables listadas al final de este archivo.
#
#  ACCESO:  http://IP-NAS:8080
# =============================================================

version: "3.9"

# ── Variables compartidas entre backend y worker ───────────────
x-backend-env: &backend-env
  SECRET_KEY:           ${SECRET_KEY:?Variable SECRET_KEY no definida en Portainer}
  ANTHROPIC_API_KEY:    ${ANTHROPIC_API_KEY:-}
  OPENAI_API_KEY:       ${OPENAI_API_KEY:-}
  GEMINI_API_KEY:       ${GEMINI_API_KEY:-}
  GOOGLE_API_KEY:       ${GOOGLE_API_KEY:-}
  AI_MODEL:             ${AI_MODEL:-gemini-2.0-flash}
  TTS_PROVIDER:         ${TTS_PROVIDER:-openai}
  ELEVENLABS_API_KEY:   ${ELEVENLABS_API_KEY:-}
  DATABASE_DIR:         /data/databases
  UPLOADS_DIR:          /data/uploads
  AUDIO_DIR:            /data/audio
  COVERS_DIR:           /data/covers
  REDIS_URL:            redis://redis:6379/0
  SMTP_HOST:            ${SMTP_HOST:-}
  SMTP_PORT:            ${SMTP_PORT:-587}
  SMTP_USER:            ${SMTP_USER:-}
  SMTP_PASS:            ${SMTP_PASS:-}
  SMTP_FROM:            ${SMTP_FROM:-noreply@booktracker.local}

x-backend-volumes: &backend-volumes
  - /volume1/docker/booktracker/data/uploads:/data/uploads
  - /volume1/docker/booktracker/data/covers:/data/covers
  - /volume1/docker/booktracker/data/audio:/data/audio
  - /volume1/docker/booktracker/data/databases:/data/databases
  - /volume1/docker/booktracker/overrides/ai_analyzer.py:/app/app/services/ai_analyzer.py:ro
  - /volume1/docker/booktracker/overrides/book_identifier.py:/app/app/services/book_identifier.py:ro

# ── Servicios ──────────────────────────────────────────────────
services:

  # -----------------------------------------------------------
  # REDIS · Cola de tareas Celery
  # -----------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: booktracker-redis
    restart: unless-stopped
    command: >
      redis-server
      --save 60 1
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    volumes:
      - /volume1/docker/booktracker/data/redis:/data
    networks:
      - booktracker-net

  # -----------------------------------------------------------
  # BACKEND · FastAPI
  # -----------------------------------------------------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: booktracker-backend
    restart: unless-stopped
    environment:
      <<: *backend-env
    volumes: *backend-volumes
    depends_on:
      - redis
    networks:
      - booktracker-net

  # -----------------------------------------------------------
  # WORKER · Celery — procesamiento IA en background
  # -----------------------------------------------------------
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: booktracker-worker
    restart: unless-stopped
    dns:
      - 8.8.8.8
      - 8.8.4.4
    command: >
      celery -A app.workers.celery_app worker
      --loglevel=info
      --concurrency=2
      --max-tasks-per-child=50
    environment:
      <<: *backend-env
    volumes: *backend-volumes
    depends_on:
      - redis
      - backend
    networks:
      - booktracker-net

  # -----------------------------------------------------------
  # FRONTEND · React + Vite
  # -----------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: booktracker-frontend
    restart: unless-stopped
    environment:
      - VITE_API_URL=/api
    networks:
      - booktracker-net

  # -----------------------------------------------------------
  # NGINX · Proxy inverso
  # -----------------------------------------------------------
  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: booktracker-nginx
    restart: unless-stopped
    ports:
      - "${NGINX_PORT:-8080}:80"
    volumes:
      - /volume1/docker/booktracker/data/covers:/data/covers:ro
      - /volume1/docker/booktracker/data/audio:/data/audio:ro
    depends_on:
      - backend
      - frontend
    networks:
      - booktracker-net

# ── Red interna ────────────────────────────────────────────────
networks:
  booktracker-net:
    driver: bridge

# =============================================================
#  VARIABLES DE ENTORNO — añadir en Portainer → Environment variables
#
#  OBLIGATORIAS:
#  ┌─────────────────────┬────────────────────────────────────────┐
#  │ SECRET_KEY          │ Texto largo aleatorio (mín. 32 chars)  │
#  │ GEMINI_API_KEY      │ AIza... — obtener en aistudio.google.com│
#  │ GOOGLE_API_KEY      │ AIza... — misma clave que GEMINI_API_KEY│
#  │ AI_MODEL            │ gemini-2.0-flash  (gratuito)           │
#  └─────────────────────┴────────────────────────────────────────┘
#
#  PARA PODCAST (opcional):
#  ┌─────────────────────┬────────────────────────────────────────┐
#  │ OPENAI_API_KEY      │ sk-...  (necesario para TTS de audio)  │
#  │ TTS_PROVIDER        │ openai                                 │
#  └─────────────────────┴────────────────────────────────────────┘
#
#  OTRAS OPCIONALES:
#  ┌─────────────────────┬────────────────────────────────────────┐
#  │ ANTHROPIC_API_KEY   │ sk-ant-...  (si prefieres Claude)      │
#  │ NGINX_PORT          │ 8080  (cambia si el puerto está ocupado)│
#  │ SMTP_HOST           │ smtp.gmail.com  (para 2FA por email)   │
#  │ SMTP_PORT           │ 587                                    │
#  │ SMTP_USER           │ tu_cuenta@gmail.com                    │
#  │ SMTP_PASS           │ App Password de Google                 │
#  └─────────────────────┴────────────────────────────────────────┘
#
#  NOTA: Los ficheros ai_analyzer.py y book_identifier.py se
#  montan desde /volume1/docker/booktracker/overrides/ para
#  permitir actualizaciones sin reconstruir la imagen Docker.
#  Asegúrate de que esa carpeta existe y contiene los ficheros.
# =============================================================
