version: "3.8"

services:
  # 💾 BASE DE DATOS (Mapeo de permisos)
  db:
    image: alpine:latest
    container_name: booktracker-db-init
    volumes:
      - /volume1/docker/booktracker/data/db:/app/db
    command: /bin/sh -c "chmod -R 777 /app/db"

  # 🚀 BACKEND (FastAPI)
  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: booktracker-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - /volume1/docker/booktracker/data:/app/data
      - /volume1/docker/booktracker/data/db:/app/db
      - /volume1/docker/booktracker/data/uploads:/app/uploads
      - /volume1/docker/booktracker/data/audio:/app/audio
      - /volume1/docker/booktracker/data/covers:/app/covers
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///app/db/books.db
      - REDIS_URL=redis://redis:6379/0
      - UPLOADS_DIR=/app/uploads
      - AUDIO_DIR=/app/audio
      - COVERS_DIR=/app/covers
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - USE_OLLAMA_FOR_FAST_TASKS=false
    depends_on:
      - redis
    networks:
      - booktracker-net

  # ⚙️ WORKER (Procesamiento de fondo)
  worker:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: booktracker-worker
    restart: unless-stopped
    volumes:
      - /volume1/docker/booktracker/data:/app/data
      - /volume1/docker/booktracker/data/db:/app/db
      - /volume1/docker/booktracker/data/uploads:/app/uploads
      - /volume1/docker/booktracker/data/audio:/app/audio
      - /volume1/docker/booktracker/data/covers:/app/covers
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///app/db/books.db
      - REDIS_URL=redis://redis:6379/0
      - UPLOADS_DIR=/app/uploads
      - AUDIO_DIR=/app/audio
      - COVERS_DIR=/app/covers
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - USE_OLLAMA_FOR_FAST_TASKS=false
    depends_on:
      - redis
    networks:
      - booktracker-net

  # 🔴 REDIS (Cola de tareas)
  redis:
    image: redis:alpine
    container_name: booktracker-redis
    restart: unless-stopped
    networks:
      - booktracker-net

  # 🌐 FRONTEND (Vite / React)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: booktracker-ui
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - booktracker-net

networks:
  booktracker-net:
    driver: bridge
